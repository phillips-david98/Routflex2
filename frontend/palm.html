<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#f4f6f9">
  <meta name="description" content="ROUTflex Palm — App do Consultor em Campo">
  <title>ROUTflex Palm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    /* ── DESIGN TOKENS ── */
    :root {
      --bg:              #f4f6f9;
      --bg-soft:         #eaeef4;
      --bg-card:         #ffffff;
      --bg-card-hover:   #e8edf5;
      --border:          rgba(0, 40, 90, 0.10);
      --border-strong:   rgba(0, 40, 90, 0.22);
      --text:            #0d1f35;
      --text-2:          #3a5070;
      --muted:           #7a96b0;
      --primary:         #0077cc;
      --primary-dim:     rgba(0, 119, 204, 0.10);
      --success:         #1a9e6f;
      --success-dim:     rgba(26, 158, 111, 0.12);
      --warning:         #cc7700;
      --warning-dim:     rgba(204, 119, 0, 0.10);
      --danger:          #cc3322;
      --danger-dim:      rgba(204, 51, 34, 0.10);
      --neutral-dim:     rgba(0, 40, 90, 0.06);
      --font-h:          'Space Grotesk', system-ui, sans-serif;
      --font-b:          'IBM Plex Sans', system-ui, sans-serif;
      --r-sm:  10px;
      --r:     16px;
      --r-lg:  22px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      background: #eaeef4;
      color: var(--text);
      font-family: var(--font-b);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* ── APP SHELL ── */
    #palm-app {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    @media (min-width: 500px) {
      #palm-app {
        box-shadow: 0 0 100px rgba(0, 0, 0, 0.7);
      }
    }

    /* ── HEADER ── */
    .palm-header {
      background: linear-gradient(160deg, #e0eaf6 0%, #d4e4f5 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }

    .palm-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .palm-logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .palm-logo-text {
      font-family: var(--font-h);
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.4px;
    }

    .palm-logo-text span { color: var(--primary); }

    .palm-badge {
      background: rgba(82, 208, 255, 0.13);
      border: 1px solid rgba(82, 208, 255, 0.28);
      color: var(--primary);
      font-family: var(--font-h);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 2px 7px;
      border-radius: 20px;
    }

    .palm-status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--success-dim);
      border: 1px solid rgba(40, 197, 139, 0.22);
      color: var(--success);
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .palm-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse-dot 2.2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.45; transform: scale(0.65); }
    }

    .palm-consultant-name {
      font-family: var(--font-h);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }

    .palm-consultant-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .meta-sep {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.4;
      flex-shrink: 0;
    }

    /* ── PROGRESS BAR ── */
    .palm-progress-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .palm-progress-bar {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.07);
      border-radius: 4px;
      overflow: hidden;
    }

    .palm-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--success), #5af0b0);
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .palm-progress-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--success);
      flex-shrink: 0;
      font-family: var(--font-h);
    }

    /* ── WEEK TABS ── */
    .palm-week-tabs {
      background: var(--bg-soft);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
    }

    .palm-week-tabs::-webkit-scrollbar { display: none; }

    .palm-tab {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-h);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
      padding: 10px 15px;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .palm-tab:hover { color: var(--text-2); }

    .palm-tab.is-active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    /* ── SCROLL BODY ── */
    .palm-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px 100px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .palm-body::-webkit-scrollbar { width: 3px; }
    .palm-body::-webkit-scrollbar-track { background: transparent; }
    .palm-body::-webkit-scrollbar-thumb { background: rgba(82,208,255,0.12); border-radius: 3px; }

    /* ── SUMMARY CARDS ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
    }

    .summary-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 11px 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      position: relative;
      overflow: hidden;
    }

    .summary-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .summary-card.planned::after { background: var(--primary); }
    .summary-card.done::after    { background: var(--success); }
    .summary-card.pending::after { background: var(--warning); }

    .summary-wide {
      grid-column: span 3;
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      overflow: hidden;
    }

    .summary-wide-half {
      padding: 10px 13px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .summary-wide-half + .summary-wide-half {
      border-left: 1px solid var(--border);
    }

    .s-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .s-value {
      font-family: var(--font-h);
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
    }

    .summary-card.planned .s-value { color: var(--primary); }
    .summary-card.done    .s-value { color: var(--success); }
    .summary-card.pending .s-value { color: var(--warning); }

    .s-sub {
      font-size: 10px;
      color: var(--muted);
    }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .section-title {
      font-family: var(--font-h);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .section-count {
      font-size: 11px;
      color: var(--muted);
      background: var(--neutral-dim);
      border-radius: 20px;
      padding: 2px 8px;
    }

    /* ── STOPS LIST ── */
    .stops-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .stop-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 13px 13px 11px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.12s;
      position: relative;
    }

    .stop-card:hover {
      border-color: rgba(0, 119, 204, 0.28);
      background: var(--bg-card-hover);
    }

    .stop-card:active { transform: scale(0.99); }

    .stop-card.is-done { opacity: 0.6; }

    .stop-row1 {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      margin-bottom: 8px;
    }

    .stop-seq {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-h);
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
      background: var(--primary-dim);
      border: 1px solid rgba(0,119,204,0.18);
      color: var(--primary);
      transition: background 0.2s, color 0.2s;
    }

    .stop-seq.done {
      background: var(--success-dim);
      border-color: rgba(40,197,139,0.2);
      color: var(--success);
    }

    .stop-info { flex: 1; min-width: 0; }

    .stop-name {
      font-family: var(--font-h);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 1px;
    }

    .stop-location {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stop-time {
      font-family: var(--font-h);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      flex-shrink: 0;
    }

    .stop-row2 {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    /* ── BADGES ── */
    .badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.3px;
      padding: 3px 7px;
      border-radius: 20px;
      white-space: nowrap;
      border: 1px solid;
    }

    .b-visitado    { background: var(--success-dim); color: var(--success); border-color: rgba(26,158,111,0.25); }
    .b-em-rota     { background: var(--primary-dim); color: var(--primary); border-color: rgba(0,119,204,0.22); }
    .b-em-visita   { background: var(--success-dim); color: var(--success); border-color: rgba(26,158,111,0.30); font-weight: 700; }
    .b-pendente    { background: var(--warning-dim); color: var(--warning); border-color: rgba(204,119,0,0.22); }
    .b-sem-contato { background: var(--danger-dim);  color: var(--danger);  border-color: rgba(204,51,34,0.22); }
    .b-reagendado  { background: var(--neutral-dim); color: var(--muted);   border-color: rgba(0,40,90,0.15); }

    .b-curve-A { background: rgba(40,197,139,0.12); color: #28c58b; border-color: rgba(40,197,139,0.22); }
    .b-curve-B { background: rgba(59,156,245,0.10); color: #3b9cf5; border-color: rgba(59,156,245,0.2); }
    .b-curve-C { background: rgba(138,143,170,0.08); color: #8a8faa; border-color: rgba(138,143,170,0.18); }

    .stop-btns {
      display: flex;
      gap: 5px;
      margin-left: auto;
    }

    .stop-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-h);
      font-size: 11px;
      font-weight: 600;
      padding: 4px 9px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .stop-btn:hover {
      background: var(--primary-dim);
      color: var(--primary);
      border-color: rgba(0,119,204,0.28);
    }

    /* ── VISIT FLOW BUTTONS ── */
    .stop-card.is-next-stop {
      border-color: rgba(0, 119, 204, 0.45);
      border-width: 2px;
    }

    .stop-card.is-active-visit {
      border-color: var(--success);
      border-width: 2px;
      background: rgba(26, 158, 111, 0.04);
    }

    .btn-start-visit {
      background: var(--primary);
      color: #fff;
      border: none;
      font-family: var(--font-h);
      font-size: 12px;
      font-weight: 700;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-start-visit:hover  { opacity: 0.88; }
    .btn-start-visit:active { transform: scale(0.97); }

    .btn-in-visit {
      background: var(--success);
      color: #fff;
      border: none;
      font-family: var(--font-h);
      font-size: 11px;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.2px;
      white-space: nowrap;
    }

    .btn-finalize-visit {
      width: 100%;
      background: var(--success);
      color: #fff;
      border: none;
      font-family: var(--font-h);
      font-size: 15px;
      font-weight: 700;
      padding: 15px;
      border-radius: var(--r-sm);
      cursor: pointer;
      margin-bottom: 10px;
      letter-spacing: 0.3px;
      transition: opacity 0.15s;
    }
    .btn-finalize-visit:hover { opacity: 0.88; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty-icon { font-size: 34px; margin-bottom: 10px; opacity: 0.45; }
    .empty-text { font-size: 13px; }

    /* ── MODAL OVERLAY ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(3, 12, 22, 0.72);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s;
    }

    .modal-overlay.is-open {
      opacity: 1;
      pointer-events: all;
    }

    /* ── BOTTOM SHEET ── */
    .bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(104%);
      width: 100%;
      max-width: 430px;
      max-height: 88vh;
      background: #0d2038;
      border: 1px solid var(--border-strong);
      border-bottom: none;
      border-radius: var(--r-lg) var(--r-lg) 0 0;
      z-index: 201;
      transition: transform 0.3s cubic-bezier(0.34, 1.15, 0.64, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .bottom-sheet.is-open {
      transform: translateX(-50%) translateY(0);
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }

    .sheet-header {
      padding: 13px 18px 11px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .sheet-title {
      font-family: var(--font-h);
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 75%;
    }

    .sheet-close {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .sheet-close:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text);
    }

    .sheet-body {
      overflow-y: auto;
      padding: 16px 18px 28px;
      flex: 1;
    }

    .sheet-body::-webkit-scrollbar { width: 3px; }
    .sheet-body::-webkit-scrollbar-thumb { background: rgba(82,208,255,0.12); border-radius: 3px; }

    /* ── DETAIL SECTIONS ── */
    .detail-section { margin-bottom: 18px; }

    .detail-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .detail-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 14px;
    }

    .detail-field {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 10px;
    }

    .detail-field-key {
      font-size: 11px;
      color: var(--muted);
    }

    .detail-field-val {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .detail-obs {
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 10px 12px;
      font-size: 13px;
      color: var(--text-2);
      font-style: italic;
      line-height: 1.55;
    }

    /* ── ACTION BUTTONS ── */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .action-btn {
      padding: 12px 8px;
      border-radius: var(--r-sm);
      border: 1px solid;
      font-family: var(--font-h);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
      text-align: center;
      line-height: 1.35;
    }

    .action-btn:hover  { filter: brightness(1.2); }
    .action-btn:active { transform: scale(0.96); }

    .action-btn:disabled {
      opacity: 0.32;
      cursor: not-allowed;
      pointer-events: none;
      transform: none;
      filter: none;
    }

    .action-btn.is-processing {
      opacity: 0.8;
      cursor: wait;
      letter-spacing: 0.2px;
    }

    .ab-green  { background: var(--success-dim);  border-color: rgba(40,197,139,0.28); color: var(--success); }
    .ab-blue   { background: var(--primary-dim);  border-color: rgba(82,208,255,0.24); color: var(--primary); }
    .ab-orange { background: var(--warning-dim);  border-color: rgba(255,179,71,0.25); color: var(--warning); }
    .ab-red    { background: var(--danger-dim);   border-color: rgba(255,111,97,0.22); color: var(--danger); }

    /* ── TOAST ── */
    .palm-toast {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #1a3a5c;
      border: 1px solid rgba(82,208,255,0.22);
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      padding: 9px 18px;
      border-radius: 30px;
      z-index: 300;
      white-space: nowrap;
      max-width: 90vw;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .palm-toast.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── LOADING SCREEN ── */
    #palm-loader {
      position: absolute;
      inset: 0;
      background: var(--bg);
      z-index: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      transition: opacity 0.4s ease;
    }

    #palm-loader.is-hiding {
      opacity: 0;
      pointer-events: none;
    }

    .loader-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .loader-logo-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .loader-logo-text {
      font-family: var(--font-h);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: var(--text);
    }

    .loader-logo-text span { color: var(--primary); }

    .loader-logo-badge {
      background: rgba(82, 208, 255, 0.13);
      border: 1px solid rgba(82, 208, 255, 0.28);
      color: var(--primary);
      font-family: var(--font-h);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 2px 7px;
      border-radius: 20px;
    }

      width: 26px;
      height: 26px;
      border: 2px solid rgba(82, 208, 255, 0.15);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: loader-spin 0.75s linear infinite;
    }

    @keyframes loader-spin {
      to { transform: rotate(360deg); }
    }

    .loader-msg {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      min-height: 18px;
      transition: opacity 0.2s;
    }

    .loader-bar-wrap {
      width: 140px;
      height: 3px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 3px;
      overflow: hidden;
    }

    .loader-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #8ee8ff);
      border-radius: 3px;
      width: 0%;
      animation: loader-bar 2s ease-out forwards;
    }

    @keyframes loader-bar {
      0%  { width: 0%; }
      25% { width: 40%; }
      60% { width: 72%; }
      90% { width: 93%; }
      100%{ width: 100%; }
    }

    /* ── SYNC PILL STATES ── */
    .palm-status-pill.is-syncing {
      background: rgba(82, 208, 255, 0.11);
      border-color: rgba(82, 208, 255, 0.24);
      color: var(--primary);
    }
    .palm-status-pill.is-syncing .palm-status-dot {
      background: var(--primary);
      animation: pulse-dot 0.55s ease-in-out infinite;
    }
    .palm-status-pill.is-pending {
      background: var(--warning-dim);
      border-color: rgba(255, 179, 71, 0.26);
      color: var(--warning);
    }
    .palm-status-pill.is-pending .palm-status-dot {
      background: var(--warning);
      animation: pulse-dot 1s ease-in-out infinite;
    }
    .palm-status-pill.is-offline {
      background: var(--danger-dim);
      border-color: rgba(255, 111, 97, 0.24);
      color: var(--danger);
    }
    .palm-status-pill.is-offline .palm-status-dot {
      background: var(--danger);
      animation: none;
    }

    /* ── KPI STRIP ── */
    .palm-kpi-strip {
      display: flex;
      gap: 7px;
      margin-top: 7px;
    }

    .kpi-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255, 255, 255, 0.028);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 9px;
    }

    .kpi-chip-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .kpi-chip-val {
      font-family: var(--font-h);
      font-size: 12px;
      font-weight: 700;
      color: var(--text-2);
    }

    .kpi-chip-val.good { color: var(--success); }
    .kpi-chip-val.warn { color: var(--warning); }
  </style>
</head>

// ── STATE ─────────────────────────────────────────────────────────────
let activeWeek = 'hoje';
let stops = STOPS_SEED.map(function(s) { return Object.assign({}, s); });
let _toastTimer = null;
let _syncTimer  = null;
let activeVisitId  = null;  // id do stop atualmente em visita
let _visitStart    = null;  // Date.now() ao iniciar visita
let _visitInterval = null;  // setInterval do cronômetro

// ── UTILITIES ─────────────────────────────────────────────────────────
function todayLabel() {
  return new Date().toLocaleDateString('pt-BR', {
    weekday: 'short', day: '2-digit', month: 'short', year: 'numeric'
  }).replace(/^\w/, function(c) { return c.toUpperCase(); });
}

function filteredStops() {
  if (activeWeek === 'hoje') {
    return stops.filter(function(s) {
      return s.week === ROUTE_CONTEXT.cycleWeek && s.day === ROUTE_CONTEXT.todayDay;
    });
  }
  var w = Number(activeWeek);
  return stops.filter(function(s) { return s.week === w; });
}

function statusLabel(status) {
  var map = {
    'visitado':    'Visitado ✓',
    'em-rota':     '→ Em Rota',
    'em-visita':   '● Em Visita',
    'pendente':    'Pendente',
    'sem-contato': 'Sem Contato',
    'reagendado':  'Reagendado',
  };
  return map[status] || status;
}

function statusClass(status) {
  var map = {
    'visitado':    'b-visitado',
    'em-rota':     'b-em-rota',
    'em-visita':   'b-em-visita',
    'pendente':    'b-pendente',
    'sem-contato': 'b-sem-contato',
    'reagendado':  'b-reagendado',
  };
  return map[status] || 'b-pendente';
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,  '&amp;')
    .replace(/</g,  '&lt;')
    .replace(/>/g,  '&gt;')
    .replace(/"/g,  '&quot;');
}

// ── TOAST ─────────────────────────────────────────────────────────────
function showToast(msg) {
  var el = document.getElementById('palm-toast');
  el.textContent = msg;
  el.classList.add('is-visible');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() {
    el.classList.remove('is-visible');
  }, 2800);
}

// ── SYNC STATE ──────────────────────────────────────────────────────────
function setSyncState(syncState) {
  var pill  = document.querySelector('.palm-status-pill');
  var label = document.getElementById('sync-label');
  if (!pill || !label) return;
  pill.classList.remove('is-syncing', 'is-pending', 'is-offline');
  var stateMap = {
    syncing: { cls: 'is-syncing', text: 'Sincronizando...' },
    pending: { cls: 'is-pending', text: 'Pendente'         },
    offline: { cls: 'is-offline', text: 'Offline'          },
    synced:  { cls: '',           text: 'Sincronizado'      },
  };
  var s = stateMap[syncState] || stateMap.synced;
  if (s.cls) pill.classList.add(s.cls);
  label.textContent = s.text;
}

// ── VISIT FLOW ─────────────────────────────────────────────────────────────
function startVisit(stopId) {
  if (activeVisitId !== null) {
    showToast('Finalize a visita atual antes de iniciar outra.');
    return;
  }
  var stop = stops.find(function(s) { return s.id === stopId; });
  if (!stop) return;
  activeVisitId  = stopId;
  _visitStart    = Date.now();
  stop.status    = 'em-visita';
  _visitInterval = setInterval(updateVisitTimer, 1000);
  setSyncState('pending');
  showToast('● Visita iniciada: ' + stop.name);
  renderAll();
  if (_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(function() { setSyncState('synced'); }, 1200);
}

function updateVisitTimer() {
  if (!activeVisitId) return;
  var elapsed = Date.now() - _visitStart;
  var mm  = Math.floor(elapsed / 60000);
  var ss  = Math.floor((elapsed % 60000) / 1000);
  var txt = '● EM VISITA · ' + (mm < 10 ? '0' : '') + mm + ':' + (ss < 10 ? '0' : '') + ss;
  var btn = document.getElementById('visit-timer-btn');
  if (btn) btn.textContent = txt;
  // atualizar também no sheet se aberto
  var sheetTimer = document.getElementById('sheet-timer-display');
  if (sheetTimer) sheetTimer.textContent = txt;
}

function finalizeVisit(stopId) {
  clearInterval(_visitInterval);
  _visitInterval = null;
  activeVisitId  = null;
  _visitStart    = null;
  updateStatus(stopId, 'visitado');
}

// ── RENDER: KPI STRIP ────────────────────────────────────────────────────
function renderKPI() {
  var fs        = filteredStops();
  var total     = fs.length;
  var done      = fs.filter(function(s) { return s.status === 'visitado'; }).length;
  var pct       = total > 0 ? Math.round((done / total) * 100) : 0;
  var remaining = total - done;
  var coverEl   = document.getElementById('kpi-coverage');
  var remEl     = document.getElementById('kpi-remaining');
  if (coverEl) {
    coverEl.textContent = pct + '%';
    coverEl.className   = 'kpi-chip-val' + (pct >= 80 ? ' good' : pct >= 40 ? '' : ' warn');
  }
  if (remEl) {
    remEl.textContent = remaining + (remaining === 1 ? ' cliente' : ' clientes');
    remEl.className   = 'kpi-chip-val' + (remaining === 0 ? ' good' : remaining <= 2 ? ' warn' : '');
  }
}

    ' · SEM '  + ROUTE_CONTEXT.cycleWeek +
    ' · '      + ROUTE_CONTEXT.todayDay +
    ' '        + ROUTE_CONTEXT.todayDate;
}

  var fs = filteredStops();

  document.getElementById('progress-label').textContent = pct + '%';
}

  var fs      = filteredStops();

  var done    = fs.filter(function(s) { return s.status === 'visitado'; }).length;
  var pending = fs.filter(function(s) { return s.status === 'pendente' || s.status === 'em-rota'; }).length;
  // Mock: distância e tempo estimado com base no total de paradas
  var distKm  = (total * 4.2).toFixed(1);
  var timeMin = total * 22;
  var timeH   = Math.floor(timeMin / 60);
  var timeM   = timeMin % 60;

  document.getElementById('summary-grid').innerHTML =
    '<div class="summary-card planned">' +
      '<div class="s-label">Planejadas</div>' +
      '<div class="s-value">' + total + '</div>' +
      '<div class="s-sub">visitas</div>' +
    '</div>' +
    '<div class="summary-card done">' +

        '<div class="s-label">Distância Est.</div>' +

// ── RENDER: STOPS LIST ────────────────────────────────────────────────
function renderStops() {
  var fs = filteredStops();
  var container = document.getElementById('stops-list');
  var titleEl   = document.getElementById('section-title');
  var countEl   = document.getElementById('section-count');

  titleEl.textContent = activeWeek === 'hoje'
    ? 'Paradas do dia'
    : ('Paradas — Semana ' + activeWeek);

  countEl.textContent = fs.length + (fs.length === 1 ? ' parada' : ' paradas');

  if (!fs.length) {
    container.innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-icon">📭</div>' +
        '<div class="empty-text">Nenhuma parada para este período.</div>' +
      '</div>';
    return;
  }

  container.innerHTML = (function() {
    var nextPendingId = (function() {
      var p = fs.find(function(s) {
        return (s.status === 'pendente' || s.status === 'em-rota') && s.id !== activeVisitId;
      });
      return p ? p.id : null;
    }());

    return fs.map(function(stop) {
      var isDone        = stop.status === 'visitado';
      var isActiveVisit = (stop.id === activeVisitId);
      var isNext        = (!activeVisitId && stop.id === nextPendingId);
      var cardClass = 'stop-card' +
        (isDone        ? ' is-done'         : '') +
        (isActiveVisit ? ' is-active-visit'  : '') +
        (isNext        ? ' is-next-stop'     : '');

      var cardBtns;
      if (isActiveVisit) {
        cardBtns =
          '<button class="btn-in-visit" id="visit-timer-btn" data-action="detail" data-id="' + stop.id + '">● EM VISITA · 00:00</button>' +
          '<button class="stop-btn" data-action="map" data-id="' + stop.id + '">Mapa ↗</button>';
      } else if (isNext) {
        cardBtns =
          '<button class="btn-start-visit" data-action="start-visit" data-id="' + stop.id + '">▶ Iniciar Visita</button>' +
          '<button class="stop-btn" data-action="map" data-id="' + stop.id + '">Mapa ↗</button>';
      } else {
        cardBtns =
          '<button class="stop-btn" data-action="detail" data-id="' + stop.id + '">Detalhes</button>' +
          '<button class="stop-btn" data-action="map"    data-id="' + stop.id + '">Mapa ↗</button>';
      }

      return (
        '<div class="' + cardClass + '" data-stop-id="' + stop.id + '">' +
          '<div class="stop-row1">' +
            '<div class="stop-seq' + (isDone ? ' done' : '') + '">' + stop.sequence + '</div>' +
            '<div class="stop-info">' +
              '<div class="stop-name">' + escHtml(stop.name) + '</div>' +
              '<div class="stop-location">' + escHtml(stop.neighborhood) + ' · ' + escHtml(stop.city) + '</div>' +
            '</div>' +
            '<div class="stop-time">' + escHtml(stop.suggestedTime) + '</div>' +
          '</div>' +
          '<div class="stop-row2">' +
            '<span class="badge ' + statusClass(stop.status) + '">' + statusLabel(stop.status) + '</span>' +
            '<span class="badge b-curve-' + stop.curve + '">Curva ' + stop.curve + '</span>' +
            '<span style="flex:1"></span>' +
            '<div class="stop-btns">' + cardBtns + '</div>' +
          '</div>' +
        '</div>'
      );
    }).join('');
  }());
}

// ── RENDER: ALL ───────────────────────────────────────────────────────
function renderAll() {
  renderProgress();
  renderKPI();
  renderSummary();
  renderStops();
}

// ── EVENT DELEGATION ──────────────────────────────────────────────────

// Week tabs
document.getElementById('week-tabs').addEventListener('click', function(e) {
  var tab = e.target.closest('.palm-tab');
  if (!tab) return;
  document.querySelectorAll('.palm-tab').forEach(function(t) {
    t.classList.remove('is-active');
  });
  tab.classList.add('is-active');
  activeWeek = tab.dataset.week;
  renderAll();
});

// Stops list — clicks on card, detail btn, map btn
document.getElementById('stops-list').addEventListener('click', function(e) {
  // Start visit button
  var startBtn = e.target.closest('[data-action="start-visit"]');
  if (startBtn) { e.stopPropagation(); startVisit(Number(startBtn.dataset.id)); return; }
  // Map button
  var mapBtn = e.target.closest('[data-action="map"]');
  if (mapBtn) { e.stopPropagation(); openMap(Number(mapBtn.dataset.id)); return; }
  // Detail button or card click
  var detailBtn = e.target.closest('[data-action="detail"]');
  if (detailBtn) { e.stopPropagation(); openSheet(Number(detailBtn.dataset.id)); return; }
  var card = e.target.closest('.stop-card');
  if (card) { openSheet(Number(card.dataset.stopId)); }
});

// Sheet action buttons
document.getElementById('sheet-body').addEventListener('click', function(e) {
  var btn = e.target.closest('[data-action]');
  if (!btn || btn.disabled) return;
  var action   = btn.dataset.action;
  var id       = Number(btn.dataset.id);
  var status   = btn.dataset.status;
  var origText = btn.textContent;

  // Lock all action buttons
  var allBtns = document.querySelectorAll('#sheet-body .action-btn');
  allBtns.forEach(function(b) { b.disabled = true; });
  btn.classList.add('is-processing');
  btn.textContent = 'Processando...';

  setTimeout(function() {
    allBtns.forEach(function(b) { b.disabled = false; });
    btn.classList.remove('is-processing');
    btn.textContent = origText;
    if (action === 'status')          { updateStatus(id, status); return; }
    if (action === 'address-issue')   { reportAddressIssue(id); return; }
    if (action === 'finalize-visit')  { finalizeVisit(id); return; }
  }, 1500);
});

// Close sheet
document.getElementById('modal-overlay').addEventListener('click', closeSheet);
document.getElementById('sheet-close').addEventListener('click',   closeSheet);
